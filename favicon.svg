<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0d20"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="sym" x1="18" y1="4" x2="46" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="64" height="64" rx="13" fill="none" stroke="rgba(96,165,250,0.15)" stroke-width="1"/>

  <!-- Integral sign ∫ -->
  <text
    x="32" y="54"
    font-family="'Times New Roman', Georgia, serif"
    font-size="54"
    font-style="italic"
    text-anchor="middle"
    fill="url(#sym)"
    filter="url(#glow)"
  >∫</text>
</svg>
